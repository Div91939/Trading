name: Daily Stock Signals

on:
  schedule:
    # Runs at these times UTC — Indian market is UTC+5:30
    # 3:45 UTC  = 9:15 AM IST  (market open)
    # 7:00 UTC  = 12:30 PM IST (midday check)
    # 10:15 UTC = 3:45 PM IST  (near close)
    - cron: '45 3 * * 1-5'
    - cron: '0 7 * * 1-5'
    - cron: '15 10 * * 1-5'
  workflow_dispatch:              # lets you trigger it manually too
permissions:
  contents: write   
jobs:
  run-signals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Hindcopper
        run: python hindcopper.py
        continue-on-error: true    # if one script fails, others still run

      - name: Run BSE
        run: python bse.py
        continue-on-error: true

      - name: Run Eicher
        run: python eicher.py
        continue-on-error: true

      - name: Commit updated CSVs back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv *.json || true
          git diff --cached --quiet || git commit -m "Auto: update data $(date +'%d-%m-%Y %H:%M UTC')"
          git push
